<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>產品詢價 — ZAP 空氣清淨機</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f4f0;min-height:100vh}
header{background:#1E2761;color:#fff;padding:14px 24px;display:flex;align-items:center;gap:10px}
header h1{font-size:17px;font-weight:600}
main{max-width:640px;margin:0 auto;padding:20px 16px}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 8px rgba(0,0,0,.07);margin-bottom:16px;overflow:hidden}
.card-header{padding:14px 18px;border-bottom:1px solid #f0eeea}
.card-title{font-size:14px;font-weight:600;color:#1c1b18}
.card-sub{font-size:12px;color:#9ca3af;margin-top:2px}
.card-body{padding:16px 18px}
.fg{margin-bottom:12px}
.fl{display:block;font-size:12px;font-weight:500;color:#374151;margin-bottom:5px}
.req{color:#ef4444}
input[type=text],input[type=email],input[type=tel],textarea{width:100%;padding:9px 12px;border:1px solid #d1d5db;border-radius:7px;font-size:14px;outline:none;transition:border-color .2s;background:#f9fafb}
input:focus,textarea:focus{border-color:#1E2761;background:#fff}
textarea{resize:vertical;min-height:72px}

/* 型號選擇 */
.sku-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sku-btn{border:1.5px solid #e5e7eb;border-radius:8px;padding:12px 6px;text-align:center;cursor:pointer;transition:all .15s;background:#fff;font-size:13px;font-weight:500;color:#374151}
.sku-btn:hover{border-color:#D4500A;color:#D4500A}
.sku-btn.selected{border-color:#D4500A;background:#fff7ed;color:#D4500A;font-weight:600}

/* 已選品項+數量 */
.selected-wrap{margin-top:14px}
.sel-row{display:grid;grid-template-columns:110px 1fr auto;gap:8px;background:#f5f4f0;border-radius:8px;padding:10px 12px;align-items:center;margin-bottom:6px}
.sel-sku{font-size:13px;font-weight:600;color:#1c1b18}
.sel-row input[type=number]{width:100%;padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;outline:none;background:#fff}
.sel-row input[type=number]:focus{border-color:#1E2761}
.sel-badge{font-size:11px;color:#1D4ED8;background:#DBEAFE;padding:2px 8px;border-radius:4px;white-space:nowrap}
.stock-warn{font-size:11px;color:#DC2626;background:#FEE2E2;padding:6px 10px;border-radius:6px;margin-top:4px}

/* 幣別 */
.currency-box{display:flex;align-items:center;gap:12px;background:#EFF6FF;border:1px solid #BFDBFE;border-radius:8px;padding:12px 16px}
.currency-label{font-weight:700;font-size:14px;color:#1E40AF}
.currency-sub{font-size:11px;color:#3B82F6}
.currency-badge{font-size:11px;background:#DBEAFE;color:#1D4ED8;padding:2px 8px;border-radius:4px;font-weight:600}

/* 送出 */
.btn-primary{width:100%;padding:14px;background:#1E2761;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:4px}
.btn-primary:hover{background:#162054}
.btn-primary:disabled{background:#9ca3af;cursor:not-allowed}

/* 成功頁 */
.success{display:none;text-align:center;padding:48px 24px}
.success-icon{font-size:56px;margin-bottom:16px}
.success-title{font-size:22px;font-weight:700;color:#16A34A;margin-bottom:8px}
.success-text{font-size:14px;color:#6b7280;line-height:1.8;margin-bottom:16px}
.success-no{font-size:13px;font-family:monospace;background:#f5f4f0;display:inline-block;padding:8px 18px;border-radius:6px;color:#1E2761;font-weight:700}
.btn-ghost{padding:10px 24px;background:#f5f4f0;border:none;border-radius:7px;font-size:14px;cursor:pointer;margin-top:16px}
footer{text-align:center;padding:16px;font-size:11px;color:#9ca3af}
</style>
</head>
<body>
<header>
  <span style="font-size:22px">🌬️</span>
  <h1>ZAP 空氣清淨機 — 產品詢價</h1>
</header>

<main>
<div id="inquiry-form">

  <!-- 聯絡資訊 -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">聯絡資訊</div>
    </div>
    <div class="card-body">
      <div class="fg"><label class="fl">公司名稱 <span class="req">*</span></label>
        <input type="text" id="f-company" placeholder="請填寫公司或單位名稱"></div>
      <div class="fg"><label class="fl">聯絡人 <span class="req">*</span></label>
        <input type="text" id="f-name" placeholder="姓名"></div>
      <div class="fg"><label class="fl">Email <span class="req">*</span></label>
        <input type="email" id="f-email" placeholder="報價單將寄至此信箱"></div>
      <div class="fg" style="margin-bottom:0"><label class="fl">電話</label>
        <input type="tel" id="f-phone" placeholder="方便聯繫的電話"></div>
    </div>
  </div>

  <!-- 型號選擇 + 數量 -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">選擇品項與數量 <span class="req">*</span></div>
      <div class="card-sub">點選型號後填寫需求數量</div>
    </div>
    <div class="card-body">
      <div class="sku-grid">
        <div class="sku-btn" onclick="toggleSku('ZAP-200')">ZAP-200</div>
        <div class="sku-btn" onclick="toggleSku('ZAP-400')">ZAP-400</div>
        <div class="sku-btn" onclick="toggleSku('ZAP-600')">ZAP-600</div>
        <div class="sku-btn" onclick="toggleSku('ZAP-800')">ZAP-800</div>
        <div class="sku-btn" onclick="toggleSku('ZAP-1200')">ZAP-1200</div>
        <div class="sku-btn" onclick="toggleSku('ZAP-1600')">ZAP-1600</div>
      </div>
      <!-- 數量輸入區（點選型號後出現）-->
      <div class="selected-wrap" id="selected-wrap" style="display:none">
        <div id="selected-items"></div>
        <div id="stock-warning"></div>
      </div>
    </div>
  </div>

  <!-- 幣別 -->
  <div class="card">
    <div class="card-header">
      <div class="card-title">計價幣別</div>
      <div class="card-sub">本公司報價一律以新台幣計算</div>
    </div>
    <div class="card-body">
      <div class="currency-box">
        <span style="font-size:22px">🇹🇼</span>
        <div>
          <div class="currency-label">新台幣（NTD）</div>
          <div class="currency-sub">New Taiwan Dollar</div>
        </div>
        <span class="currency-badge">預設幣別</span>
        <div style="font-size:12px;color:#6B7280;margin-left:8px">如需外幣請在備註說明</div>
      </div>
    </div>
  </div>

  <!-- 備註 -->
  <div class="card">
    <div class="card-header"><div class="card-title">其他需求</div></div>
    <div class="card-body">
      <div class="fg" style="margin-bottom:0">
        <label class="fl">備註（選填）</label>
        <textarea id="f-note" placeholder="如：急單、指定交貨日期、安裝需求等"></textarea>
      </div>
    </div>
  </div>

  <button class="btn-primary" id="submit-btn" onclick="submitInquiry()">送出詢價</button>
</div>

<!-- 成功頁 -->
<div class="success" id="success-page">
  <div class="success-icon">✅</div>
  <div class="success-title">詢價已送出！</div>
  <div class="success-text">
    感謝您的詢價<br>
    業務將在 <strong>2 小時內</strong> 寄送正式報價單至您的信箱<br>
    報價幣別：<strong style="color:#1E40AF">新台幣（NTD）</strong><br>
    如有緊急需求請致電：<strong>0932-173-810</strong>
  </div>
  <div class="success-no" id="inquiry-no"></div>
  <br>
  <button class="btn-ghost" onclick="location.reload()">再次詢價</button>
</div>
</main>
<footer>ADDWII · 研能科技有限公司 · ZAP 空氣清淨機</footer>

<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbx5rpoJpPEU3ddLpRFbAccJtQVTj_5QX9jL56BbT4Qy-qBvqgFQ5lwrtybvB_SbbcJl/exec';
const selected={};

// ── 型號切換 ──
function toggleSku(sku){
  const btn=document.querySelector(`.sku-btn[onclick="toggleSku('${sku}')"]`);
  if(selected[sku]){
    delete selected[sku];
    btn.classList.remove('selected');
  } else {
    selected[sku]=1;
    btn.classList.add('selected');
  }
  renderSelected();
}

// ── 渲染已選品項 + 數量輸入 ──
function renderSelected(){
  const wrap=document.getElementById('selected-wrap');
  const el=document.getElementById('selected-items');
  const items=Object.entries(selected);

  if(!items.length){
    wrap.style.display='none';
    el.innerHTML='';
    document.getElementById('stock-warning').innerHTML='';
    return;
  }

  wrap.style.display='block';
  el.innerHTML=items.map(([sku,qty])=>`
    <div class="sel-row">
      <div class="sel-sku">${sku}</div>
      <input type="number" min="1" value="${qty}"
        placeholder="數量（台）"
        oninput="selected['${sku}']=parseInt(this.value)||1;checkStockWarning()"
        style="max-width:120px">
      <span class="sel-badge">台幣報價</span>
    </div>`).join('');
  document.getElementById('stock-warning').innerHTML='';
}

// ── 即時庫存警示（輸入數量時） ──
async function checkStockWarning(){
  const warnEl=document.getElementById('stock-warning');
  const items=Object.entries(selected).map(([sku,qty])=>({sku,qty:parseInt(qty)||1}));
  if(!items.length){ warnEl.innerHTML=''; return; }

  try{
    const res=await fetch(GAS_URL,{
      method:'POST', mode:'cors',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({action:'checkStockByItems',items})
    });
    const data=await res.json();
    if(data.status==='success' && !data.allEnough){
      const warns=data.data.filter(r=>!r.enough)
        .map(r=>`⚠️ ${r.sku}：需要 ${r.need} 台，現有庫存 ${r.available} 台`)
        .join('<br>');
      warnEl.innerHTML=`<div class="stock-warn">${warns}<br><small>庫存不足品項需另行採購，請與業務確認交期</small></div>`;
    } else {
      warnEl.innerHTML='';
    }
  }catch(e){ warnEl.innerHTML=''; }
}

// ── 送出詢價 ──
async function submitInquiry(){
  const company=document.getElementById('f-company').value.trim();
  const name   =document.getElementById('f-name').value.trim();
  const email  =document.getElementById('f-email').value.trim();
  const phone  =document.getElementById('f-phone').value.trim();
  const note   =document.getElementById('f-note').value.trim();

  if(!company){ alert('請填寫公司名稱'); return; }
  if(!name)   { alert('請填寫聯絡人姓名'); return; }
  if(!email)  { alert('請填寫 Email'); return; }
  if(!Object.keys(selected).length){ alert('請至少選擇一個型號'); return; }

  // 數量驗證
  for(const [sku,qty] of Object.entries(selected)){
    if(!qty||qty<1){ alert(`請填寫 ${sku} 的數量`); return; }
  }

  const btn=document.getElementById('submit-btn');
  btn.disabled=true;
  btn.textContent='檢查庫存中...';

  // ── 送出前庫存檢查 ──
  try{
    const stockRes=await fetch(GAS_URL,{
      method:'POST', mode:'cors',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({
        action:'checkStockByItems',
        items:Object.entries(selected).map(([sku,qty])=>({sku,qty:parseInt(qty)||1}))
      })
    });
    const stockData=await stockRes.json();

    if(stockData.status==='success' && !stockData.allEnough){
      const warns=stockData.data.filter(r=>!r.enough)
        .map(r=>`• ${r.sku}：需要 ${r.need} 台，庫存只有 ${r.available} 台`)
        .join('\n');

      btn.disabled=false;
      btn.textContent='送出詢價';

      const ok=confirm(
        '⚠️ 庫存不足警告\n\n' + warns +
        '\n\n送出後系統會自動啟動採購程序，\n預計需要 3-4 週補貨。\n\n是否仍要送出詢價？'
      );
      if(!ok) return;
    }
  }catch(e){
    // 查詢失敗 → 允許繼續送出
  }

  btn.disabled=true;
  btn.textContent='送出中...';

  // ── 組合品項文字 ──
  const currency='NTD（新台幣）';
  const itemText=Object.entries(selected)
    .map(([sku,qty])=>`${sku} x ${qty}台`).join('、');

  // ── 產生詢價單號 ──
  const _d=new Date();
  const _ds=_d.getFullYear()+('0'+(_d.getMonth()+1)).slice(-2)+('0'+_d.getDate()).slice(-2);
  const _sq=String(Math.floor(Date.now()/1000)%1000).padStart(3,'0');
  const no='INQ-'+_ds+'-'+_sq;

  // ── 寫入 Google Sheets ──
  try{
    fetch(GAS_URL,{
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'text/plain'},
      body:JSON.stringify({
        action:'addInquiry',
        詢價單號:no,
        公司名稱:company,
        聯絡人:name,
        Email:email,
        電話:phone||'未填',
        詢價品項:itemText,
        計價幣別:currency,
        備註:note||'無'
      })
    });
  }catch(e){}

  // ── 顯示成功頁 ──
  setTimeout(()=>{
    document.getElementById('inquiry-no').textContent='詢價單號：'+no;
    document.getElementById('inquiry-form').style.display='none';
    document.getElementById('success-page').style.display='block';
  },800);
}
</script>
</body>
</html>
