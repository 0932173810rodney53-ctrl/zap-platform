<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>確認報價 — ADDWII</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f5f4f0;--white:#fff;--border:#e2e0d6;
  --ink:#1c1b18;--ink2:#6b6860;--ink3:#a8a69e;
  --orange:#d4500a;--green:#16a34a;--blue:#2563eb;
  --sans:'Noto Sans TC',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;}

header{
  background:var(--ink);padding:0 24px;height:56px;
  display:flex;align-items:center;
}
.logo{color:#fff;font-size:16px;font-weight:700;letter-spacing:.08em;}
.logo span{color:var(--orange);}

main{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}

.card{
  background:var(--white);border:1px solid var(--border);
  border-radius:16px;padding:40px 32px;
  max-width:480px;width:100%;
}

.icon-wrap{
  width:72px;height:72px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;font-size:32px;
}
.title{font-size:20px;font-weight:700;margin-bottom:8px;text-align:center;}
.subtitle{font-size:14px;color:var(--ink2);line-height:1.7;margin-bottom:24px;text-align:center;}

.info-box{
  background:var(--bg);border-radius:10px;padding:16px 18px;
  margin-bottom:14px;
}
.info-label{font-size:11px;color:var(--ink3);letter-spacing:.08em;margin-bottom:4px;}
.info-value{font-size:15px;font-weight:600;color:var(--ink);}

.btn{
  width:100%;padding:14px;border-radius:10px;border:none;
  cursor:pointer;font-family:var(--sans);font-size:15px;
  font-weight:600;transition:all .2s;margin-top:6px;
}
.btn-orange{background:var(--orange);color:#fff;}
.btn-orange:hover{background:#bf4508;}
.btn-ghost{
  background:none;border:1.5px solid var(--border);
  color:var(--ink2);font-size:14px;
}
.btn-ghost:hover{border-color:var(--ink2);color:var(--ink);}

.loading{text-align:center;padding:40px;color:var(--ink2);}
.error-state{text-align:center;}

footer{
  text-align:center;padding:20px;
  font-size:12px;color:var(--ink3);
}
</style>
</head>
<body>

<header>
  <div class="logo">ADD<span>WII</span></div>
</header>

<main>

  <!-- 載入中 -->
  <div id="loading-state" class="card">
    <div class="loading">載入中...</div>
  </div>

  <!-- 確認報價頁 -->
  <div class="card" id="confirm-state" style="display:none;">
    <div class="icon-wrap" style="background:#fff8f5;">📋</div>
    <div class="title">確認報價</div>
    <div class="subtitle">請確認以下報價資訊，<br>確認後訂單將正式成立。</div>

    <div class="info-box">
      <div class="info-label">詢價單號</div>
      <div class="info-value" id="disp-no" style="color:var(--orange);">—</div>
    </div>
    <div class="info-box" id="box-price" style="display:none;">
      <div class="info-label">報價內容</div>
      <div class="info-value" id="disp-price" style="font-size:14px;">—</div>
    </div>
    <div class="info-box" id="box-shipdate" style="display:none;">
      <div class="info-label">預計出貨日期</div>
      <div class="info-value" id="disp-shipdate" style="color:var(--blue);">—</div>
    </div>

    <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:14px 16px;margin:20px 0;font-size:13px;color:#92400e;line-height:1.7;">
      ⚠️ 確認後即表示您同意此報價，訂單將正式成立。<br>付款方式依合約條件執行。
    </div>

    <button class="btn btn-orange" onclick="doConfirm()">✅ 確認接受報價，成立訂單</button>
    <button class="btn btn-ghost" onclick="notAccept()">暫不確認</button>
  </div>

  <!-- 成功頁 -->
  <div class="card" id="success-state" style="display:none;text-align:center;">
    <div class="icon-wrap" style="background:#f0fdf4;margin:0 auto 20px;">🎉</div>
    <div class="title" style="color:var(--green);">訂單成立！</div>
    <div class="subtitle">感謝您的確認，訂單已正式成立。<br>我們將於確認付款後安排出貨程序。</div>
    <div class="info-box" style="margin-top:16px;">
      <div class="info-label">訂單編號</div>
      <div class="info-value" id="success-no" style="color:var(--orange);">—</div>
    </div>
    <div style="background:#d4500a;border-radius:14px;padding:22px 24px;margin-top:20px;">
      <div style="font-size:20px;font-weight:700;color:#fff;line-height:1.5;">
        💰 確認付款後安排出貨程序
      </div>
    </div>
  </div>

  <!-- 錯誤頁 -->
  <div class="card" id="error-state" style="display:none;text-align:center;">
    <div class="icon-wrap" style="background:#fef2f2;">⚠️</div>
    <div class="title" style="color:#dc2626;">連結無效</div>
    <div class="subtitle">找不到對應的報價資訊，<br>請聯繫業務人員確認。</div>
  </div>

</main>

<footer>ADDWII · 研能科技有限公司</footer>

<script>
const API = 'https://script.google.com/macros/s/AKfycbx5rpoJpPEU3ddLpRFbAccJtQVTj_5QX9jL56BbT4Qy-qBvqgFQ5lwrtybvB_SbbcJl/exec';

var orderNo = '';

(function init(){
  var params = new URLSearchParams(window.location.search);
  orderNo = params.get('confirm') || params.get('no') || '';

  if(!orderNo){
    // 沒有帶參數，顯示手動輸入框
    show('input-state');
    return;
  }
  loadOrder(orderNo);
})();

function loadOrder(no) {
  orderNo = no.trim();
  if(!orderNo){ alert('請輸入詢價單號'); return; }

  // 直接顯示確認頁（不查詢 API，避免 CORS 問題）
  // 詳細資訊客戶可從報價信中確認
  document.getElementById('disp-no').textContent = orderNo;
  document.getElementById('box-price').style.display = 'none';
  show('confirm-state');
}

async function doConfirm(){
  var btn = document.querySelector('.btn-orange');
  btn.textContent = '處理中...';
  btn.disabled = true;

  try {
    await fetch(API, {
      method: 'POST',
      body: JSON.stringify({ action: 'confirmOrder', '詢價單號': orderNo })
    });
  } catch(e) {}

  document.getElementById('success-no').textContent = orderNo;
  show('success-state');
}

function notAccept(){
  show('error-state');
  document.getElementById('error-state').querySelector('.title').textContent = '已取消';
  document.getElementById('error-state').querySelector('.subtitle').textContent = '您已取消此次確認。\n如需重新確認請聯繫業務人員。';
  document.getElementById('error-state').querySelector('.icon-wrap').textContent = '👋';
}

function show(id){
  ['loading-state','confirm-state','success-state','error-state'].forEach(function(s){
    document.getElementById(s).style.display = s === id ? 'block' : 'none';
  });
}
</script>
</body>
</html>
