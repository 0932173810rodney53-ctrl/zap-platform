<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>確認訂單 — ZAP 空氣清淨機</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f5f4f0;min-height:100vh;display:flex;flex-direction:column}
header{background:#1E2761;color:#fff;padding:16px 24px;display:flex;align-items:center;gap:12px}
header h1{font-size:18px;font-weight:600}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px}
.card{background:#fff;border-radius:12px;box-shadow:0 2px 16px rgba(0,0,0,.08);padding:36px 32px;width:100%;max-width:480px;text-align:center}
.icon{font-size:48px;margin-bottom:16px}
.title{font-size:22px;font-weight:700;color:#1E2761;margin-bottom:8px}
.subtitle{font-size:14px;color:#6b7280;margin-bottom:24px;line-height:1.6}
.no-badge{background:#EFF6FF;color:#1E40AF;font-size:15px;font-weight:700;padding:10px 20px;border-radius:8px;display:inline-block;margin-bottom:24px;letter-spacing:1px}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f3f4f6;font-size:14px}
.info-row:last-child{border-bottom:none}
.info-label{color:#6b7280}
.info-value{font-weight:600;color:#111827}
.btn{display:block;width:100%;padding:14px;border:none;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;margin-top:12px;transition:opacity .2s}
.btn-primary{background:#16A34A;color:#fff}
.btn-primary:hover{opacity:.9}
.btn-cancel{background:#f3f4f6;color:#374151}
.btn-cancel:hover{background:#e5e7eb}
input[type=text]{width:100%;padding:12px 16px;border:1px solid #d1d5db;border-radius:8px;font-size:15px;text-align:center;margin-bottom:12px;outline:none;transition:border-color .2s}
input[type=text]:focus{border-color:#1E2761}
footer{text-align:center;padding:16px;font-size:12px;color:#9ca3af}
</style>
</head>
<body>
<header>
  <span style="font-size:24px">🌬️</span>
  <h1>ZAP 空氣清淨機 — 訂單確認</h1>
</header>

<main>

  <!-- 輸入單號 -->
  <div class="card" id="s-input">
    <div class="icon">📋</div>
    <div class="title">輸入詢價單號</div>
    <div class="subtitle">請輸入您收到的詢價單號<br>格式：INQ-年月日-序號</div>
    <input type="text" id="inp-no" placeholder="INQ-20260421-434" oninput="this.value=this.value.toUpperCase()">
    <button class="btn btn-primary" onclick="doQuery()">查詢訂單</button>
  </div>

  <!-- 確認頁 -->
  <div class="card" id="s-confirm" style="display:none">
    <div class="icon">📄</div>
    <div class="title">確認您的訂單</div>
    <div class="subtitle">請確認以下資訊，按下確認即完成訂單</div>
    <div class="no-badge" id="disp-no"></div>
    <div style="text-align:left;margin-bottom:20px">
      <div class="info-row">
        <span class="info-label">幣別</span>
        <span class="info-value">新台幣（NTD）</span>
      </div>
    </div>
    <button class="btn btn-primary" onclick="doConfirm()">✅ 確認訂單</button>
    <button class="btn btn-cancel" onclick="goBack()">返回重新輸入</button>
  </div>

  <!-- 成功頁 -->
  <div class="card" id="s-success" style="display:none">
    <div class="icon">✅</div>
    <div class="title">訂單確認成功！</div>
    <div class="subtitle">感謝您確認訂單<br>業務將在確認後安排出貨<br>如有問題請聯繫：<strong>0932-173-810</strong></div>
    <div class="no-badge" id="success-no"></div>
    <button class="btn btn-cancel" style="margin-top:20px" onclick="location.href='inquiry.html'">返回詢價頁</button>
  </div>

  <!-- 錯誤頁 -->
  <div class="card" id="s-error" style="display:none">
    <div class="icon">⚠️</div>
    <div class="title" id="err-title">發生錯誤</div>
    <div class="subtitle" id="err-msg">請聯繫業務人員確認</div>
    <button class="btn btn-cancel" style="margin-top:20px" onclick="goBack()">重新輸入</button>
  </div>

</main>

<footer>ADDWII · 研能科技有限公司 · ZAP 空氣清淨機</footer>

<script>
var API = 'https://script.google.com/macros/s/AKfycbx5rpoJpPEU3ddLpRFbAccJtQVTj_5QX9jL56BbT4Qy-qBvqgFQ5lwrtybvB_SbbcJl/exec';
var orderNo = '';

// 頁面載入：檢查 URL 參數
(function(){
  var p = new URLSearchParams(window.location.search);
  var no = p.get('confirm') || p.get('no') || '';
  if(no) {
    document.getElementById('inp-no').value = no;
    doQuery();
  }
})();

function show(id) {
  ['s-input','s-confirm','s-success','s-error'].forEach(function(s){
    document.getElementById(s).style.display = s===id ? 'block' : 'none';
  });
}

function doQuery() {
  var no = document.getElementById('inp-no').value.trim();
  if(!no) { alert('請輸入詢價單號'); return; }
  orderNo = no;
  // 直接顯示確認頁（不查詢API，避免CORS問題）
  document.getElementById('disp-no').textContent = orderNo;
  show('s-confirm');
}

function doConfirm() {
  var btn = document.querySelector('#s-confirm .btn-primary');
  btn.disabled = true;
  btn.textContent = '確認中...';

  // 用 no-cors 寫入（只寫入，不讀取回應）
  fetch(API, {
    method: 'POST',
    mode: 'no-cors',
    headers: {'Content-Type': 'text/plain'},
    body: JSON.stringify({ action: 'confirmOrder', '詢價單號': orderNo })
  }).catch(function(){});

  // 直接顯示成功（no-cors 無法讀回應，視為成功）
  setTimeout(function(){
    document.getElementById('success-no').textContent = orderNo;
    show('s-success');
  }, 1000);
}

function goBack() {
  document.getElementById('inp-no').value = orderNo;
  show('s-input');
}
</script>
</body>
</html>
